name: Docs Sync

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/**'
      - 'scripts/docs-sync.js'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm ci --prefer-offline --no-audit --no-fund

      - name: Dry run
        run: |
          node scripts/docs-sync.js --dry > docs-sync-report.json

      - name: Push to Supabase wiki_documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/docs-sync.js --push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-sync-report
          path: docs-sync-report.json

